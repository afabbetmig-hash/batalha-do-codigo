<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0a0a1a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 15px;
    }

    h1 {
      color: #00e5ff;
      font-size: 1.4rem;
      text-align: center;
    }

    /* ===== TELA ENTRADA ===== */
    #tela-entrada {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
      padding: 20px;
    }

    #tela-entrada input {
      width: 80%;
      padding: 15px;
      font-size: 1.2rem;
      border-radius: 10px;
      border: 2px solid #00e5ff;
      background-color: #111133;
      color: white;
      text-align: center;
      outline: none;
    }

    #tela-entrada input::placeholder { color: #555; }

    .titulo-escolha { font-size: 1rem; color: #aaaaaa; }

    #escolha {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 80%;
    }

    .btn-tanque {
      padding: 15px 10px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      opacity: 0.5;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-tanque.selecionado {
      opacity: 1;
      transform: scale(1.05);
      border: 3px solid white;
    }

    .btn-tanque.ocupado {
      opacity: 0.2;
      cursor: not-allowed;
      text-decoration: line-through;
    }

    #btn-azul    { background-color: #0055ff; color: white; }
    #btn-vermelho { background-color: #ff2200; color: white; }
    #btn-verde   { background-color: #00aa00; color: white; }
    #btn-amarelo { background-color: #cc8800; color: white; }

    #btn-entrar {
      padding: 15px 40px;
      font-size: 1.2rem;
      background-color: #00e5ff;
      color: #0a0a1a;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      width: 80%;
    }

    #btn-entrar:active { background-color: #00bbdd; }

    /* ===== TELA ESPERA ===== */
    #tela-espera {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      padding: 20px;
    }

    .apelido { font-size: 1.5rem; font-weight: bold; color: #ffaa00; }
    .status { font-size: 1rem; color: #aaaaaa; }

    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid #333;
      border-top: 5px solid #00e5ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== TELA CONTROLES ===== */
    #tela-controles {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    #tanque-escolhido {
      font-size: 1.1rem;
      color: #ffaa00;
      font-weight: bold;
    }

    #controles {
      display: grid;
      grid-template-columns: repeat(3, 75px);
      grid-template-rows: repeat(3, 75px);
      gap: 8px;
    }

    .btn-dir {
      width: 75px;
      height: 75px;
      font-size: 1.8rem;
      border: none;
      border-radius: 15px;
      background-color: #1a1a3a;
      color: white;
      cursor: pointer;
      border: 2px solid #00e5ff;
    }

    .btn-dir:active {
      background-color: #00e5ff;
      color: #0a0a1a;
    }

    .vazio { visibility: hidden; }

    #btn-tiro {
      width: 240px;
      height: 60px;
      font-size: 1.5rem;
      border: none;
      border-radius: 15px;
      background-color: #ff6600;
      color: white;
      cursor: pointer;
      font-weight: bold;
      border: 2px solid #ffaa00;
    }

    #btn-tiro:active {
      background-color: #ffaa00;
      color: #0a0a1a;
    }

    /* ===== TELA ELIMINADO ===== */
    #tela-eliminado {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    #tela-eliminado .emoji { font-size: 5rem; }
    #tela-eliminado p { font-size: 1.3rem; color: #aaaaaa; }
  </style>
</head>
<body>

  <h1>🎮 Batalha do Código</h1>

  <!-- ENTRADA -->
  <div id="tela-entrada">
    <input type="text" id="input-apelido" placeholder="Digite seu apelido..." maxlength="15">
    <span class="titulo-escolha">Escolha seu tanque:</span>
    <div id="escolha">
      <button class="btn-tanque" id="btn-azul"     onclick="escolherTanque('tanque1')">🟦 Azul</button>
      <button class="btn-tanque" id="btn-vermelho"  onclick="escolherTanque('tanque2')">🟥 Vermelho</button>
      <button class="btn-tanque" id="btn-verde"    onclick="escolherTanque('tanque3')">🟩 Verde</button>
      <button class="btn-tanque" id="btn-amarelo"  onclick="escolherTanque('tanque4')">🟨 Amarelo</button>
    </div>
    <button id="btn-entrar" onclick="entrar()">✅ ENTRAR</button>
  </div>

  <!-- ESPERA -->
  <div id="tela-espera">
    <div class="apelido" id="apelido-confirmado"></div>
    <div class="status">Aguardando o jogo começar...</div>
    <div class="loader"></div>
  </div>

  <!-- CONTROLES -->
  <div id="tela-controles">
    <div id="tanque-escolhido"></div>
    <div id="controles">
      <div class="vazio"></div>
      <button class="btn-dir" onclick="enviar('cima')">⬆️</button>
      <div class="vazio"></div>
      <button class="btn-dir" onclick="enviar('esquerda')">⬅️</button>
      <div class="vazio"></div>
      <button class="btn-dir" onclick="enviar('direita')">➡️</button>
      <div class="vazio"></div>
      <button class="btn-dir" onclick="enviar('baixo')">⬇️</button>
      <div class="vazio"></div>
    </div>
    <button id="btn-tiro" onclick="atirar()">💥 ATIRAR</button>
  </div>

  <!-- ELIMINADO -->
  <div id="tela-eliminado">
    <div class="emoji">💀</div>
    <p>Você foi eliminado!</p>
    <p>Aguarde o fim da partida...</p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let tanqueEscolhido = null;
    let apelidoJogador = '';

    const btnIds = {
      tanque1: 'btn-azul',
      tanque2: 'btn-vermelho',
      tanque3: 'btn-verde',
      tanque4: 'btn-amarelo'
    };

    // Atualiza botões ocupados no lobby
    socket.on('lobby-atualizado', (data) => {
      for (const t in btnIds) {
        const btn = document.getElementById(btnIds[t]);
        if (data[t] && data[t] !== apelidoJogador) {
          btn.classList.add('ocupado');
          btn.classList.remove('selecionado');
        } else {
          btn.classList.remove('ocupado');
        }
      }
    });

    function escolherTanque(tanque) {
      const btn = document.getElementById(btnIds[tanque]);
      if (btn.classList.contains('ocupado')) {
        alert('Esse tanque já está ocupado!');
        return;
      }
      tanqueEscolhido = tanque;
      for (const t in btnIds) {
        document.getElementById(btnIds[t]).classList.remove('selecionado');
      }
      btn.classList.add('selecionado');
    }

    function entrar() {
      const apelido = document.getElementById('input-apelido').value.trim();
      if (!apelido) { alert('Digite um apelido!'); return; }
      if (!tanqueEscolhido) { alert('Escolha um tanque!'); return; }

      apelidoJogador = apelido;

      socket.emit('jogador-entrou', { apelido, tanque: tanqueEscolhido });

      document.getElementById('tela-entrada').style.display = 'none';
      document.getElementById('tela-espera').style.display = 'flex';

      const emojis = { tanque1:'🟦', tanque2:'🟥', tanque3:'🟩', tanque4:'🟨' };
      document.getElementById('apelido-confirmado').textContent = emojis[tanqueEscolhido] + ' ' + apelido;
    }

    socket.on('vaga-ocupada', () => {
      alert('Essa vaga foi ocupada por outro jogador! Escolha outro tanque.');
      document.getElementById('tela-espera').style.display = 'none';
      document.getElementById('tela-entrada').style.display = 'flex';
    });

    socket.on('jogo-iniciado', () => {
      document.getElementById('tela-espera').style.display = 'none';
      document.getElementById('tela-controles').style.display = 'flex';
      const emojis = { tanque1:'🟦', tanque2:'🟥', tanque3:'🟩', tanque4:'🟨' };
      document.getElementById('tanque-escolhido').textContent =
        'Você é: ' + emojis[tanqueEscolhido] + ' ' + apelidoJogador;
    });

    socket.on('jogador-eliminado', (tanque) => {
      if (tanque === tanqueEscolhido) {
        document.getElementById('tela-controles').style.display = 'none';
        document.getElementById('tela-eliminado').style.display = 'flex';
      }
    });

    socket.on('revanche', () => {
      document.getElementById('tela-eliminado').style.display = 'none';
      document.getElementById('tela-espera').style.display = 'none';
      document.getElementById('tela-controles').style.display = 'none';
      document.getElementById('tela-espera').style.display = 'flex';
    });

    socket.on('nova-partida', () => {
      location.reload();
    });

    function enviar(direcao) {
      socket.emit('comando', { tanque: tanqueEscolhido, direcao });
    }

    function atirar() {
      socket.emit('comando', { tanque: tanqueEscolhido, atirar: true });
    }
  </script>

</body>
</html>
