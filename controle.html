<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0a0a1a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      color: #00e5ff;
      margin-bottom: 10px;
      font-size: 1.5rem;
    }

    #escolha {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .btn-tanque {
      padding: 15px 25px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    #btn1 { background-color: #0055ff; color: white; }
    #btn2 { background-color: #ff2200; color: white; }

    #controles {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      gap: 10px;
    }

    .btn-dir {
      width: 80px;
      height: 80px;
      font-size: 2rem;
      border: none;
      border-radius: 15px;
      background-color: #1a1a3a;
      color: white;
      cursor: pointer;
      border: 2px solid #00e5ff;
    }

    .btn-dir:active {
      background-color: #00e5ff;
      color: #0a0a1a;
    }

    .vazio { visibility: hidden; }

    #tanque-escolhido {
      margin-bottom: 20px;
      font-size: 1.1rem;
      color: #ffaa00;
    }
  </style>
</head>
<body>

  <h1>🎮 Controle</h1>

  <div id="escolha">
    <button class="btn-tanque" id="btn1" onclick="escolher('tanque1')">🟦 Tanque 1</button>
    <button class="btn-tanque" id="btn2" onclick="escolher('tanque2')">🟥 Tanque 2</button>
  </div>

  <div id="tanque-escolhido">Escolha seu tanque acima!</div>

  <div id="controles">
    <div class="vazio"></div>
    <button class="btn-dir" onclick="enviar('cima')">⬆️</button>
    <div class="vazio"></div>

    <button class="btn-dir" onclick="enviar('esquerda')">⬅️</button>
    <div class="vazio"></div>
    <button class="btn-dir" onclick="enviar('direita')">➡️</button>

    <div class="vazio"></div>
    <button class="btn-dir" onclick="enviar('baixo')">⬇️</button>
    <div class="vazio"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let tanqueEscolhido = null;

    function escolher(tanque) {
      tanqueEscolhido = tanque;
      const nome = tanque === 'tanque1' ? '🟦 Tanque 1' : '🟥 Tanque 2';
      document.getElementById('tanque-escolhido').textContent = 'Você é: ' + nome;
    }

    function enviar(direcao) {
      if (!tanqueEscolhido) {
        alert('Escolha um tanque primeiro!');
        return;
      }
      socket.emit('comando', {
        tanque: tanqueEscolhido,
        direcao: direcao
      });
    }
  </script>

</body>
</html>
