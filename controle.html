<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0a0a1a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    h1 { color: #00e5ff; font-size: 1.3rem; margin-bottom: 10px; }

    /* ===== TELA ENTRADA ===== */
    #tela-entrada {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
      padding: 20px;
    }
    #tela-entrada input {
      width: 80%;
      padding: 14px;
      font-size: 1.1rem;
      border-radius: 10px;
      border: 2px solid #00e5ff;
      background-color: #111133;
      color: white;
      text-align: center;
      outline: none;
    }
    #tela-entrada input::placeholder { color: #555; }
    .titulo-escolha { font-size: 0.95rem; color: #aaaaaa; }

    /* ===== BOTÕES DE TANQUE COM FOTO ===== */
    #escolha {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 85%;
    }
    .btn-tanque {
      padding: 12px 10px;
      font-size: 0.9rem;
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      opacity: 0.55;
      transition: opacity 0.2s, transform 0.1s, border-color 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .btn-tanque img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.2);
    }
    .btn-tanque span { font-size: 0.85rem; }
    .btn-tanque.selecionado { opacity: 1; transform: scale(1.05); border-color: white; }
    .btn-tanque.ocupado { opacity: 0.2; cursor: not-allowed; }
    .btn-tanque.ocupado img { filter: grayscale(1); }
    .btn-tanque.ocupado span { text-decoration: line-through; }
    #btn-azul     { background-color: #0044cc; color: white; }
    #btn-vermelho { background-color: #cc1100; color: white; }
    #btn-verde    { background-color: #008800; color: white; }
    #btn-amarelo  { background-color: #aa7700; color: white; }

    #btn-entrar {
      padding: 14px 40px;
      font-size: 1.1rem;
      background-color: #00e5ff;
      color: #0a0a1a;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      width: 80%;
    }

    /* ===== TELA ESPERA ===== */
    #tela-espera {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }
    .apelido { font-size: 1.5rem; font-weight: bold; color: #ffaa00; }
    .status  { font-size: 1rem; color: #aaaaaa; }
    .loader {
      width: 50px; height: 50px;
      border: 5px solid #333;
      border-top: 5px solid #00e5ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== TELA CONTROLES ===== */
    #tela-controles {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
      height: 100vh;
    }
    #tanque-escolhido { font-size: 1rem; color: #ffaa00; font-weight: bold; display: flex; align-items: center; gap: 10px; }
    #tanque-escolhido img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #ffaa00; }
    .controles-layout {
      display: flex;
      align-items: center;
      justify-content: space-around;
      width: 100%;
      padding: 0 20px;
    }
    #joystick-container {
      position: relative;
      width: 160px;
      height: 160px;
    }
    #joystick-base {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background-color: rgba(255,255,255,0.08);
      border: 3px solid rgba(0,229,255,0.4);
      position: absolute;
      top: 0; left: 0;
    }
    #joystick-thumb {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #00e5ff, #0055aa);
      border: 3px solid rgba(255,255,255,0.4);
      position: absolute;
      top: 45px; left: 45px;
      box-shadow: 0 4px 15px rgba(0,229,255,0.5);
      touch-action: none;
    }
    #btn-tiro {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ff8800, #cc3300);
      border: 3px solid rgba(255,200,0,0.5);
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,100,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      touch-action: none;
    }
    #btn-tiro:active { transform: scale(0.95); }
    #btn-tiro .tiro-emoji { font-size: 1.8rem; }

    /* ===== TELA ELIMINADO ===== */
    #tela-eliminado {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }
    #tela-eliminado .emoji { font-size: 5rem; }
    #tela-eliminado p { font-size: 1.2rem; color: #aaaaaa; }

    /* ===== TELA REVANCHE ===== */
    #tela-revanche {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }
    #tela-revanche .emoji { font-size: 4rem; }
    #tela-revanche p { font-size: 1.1rem; color: #aaaaaa; }
    #tela-revanche .loader {
      width: 50px; height: 50px;
      border: 5px solid #333;
      border-top: 5px solid #ff6600;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>

  <h1>🎮 Batalha do Código</h1>

  <div id="tela-entrada">
    <input type="text" id="input-apelido" placeholder="Digite seu apelido..." maxlength="15">
    <span class="titulo-escolha">Escolha seu personagem:</span>
    <div id="escolha">
      <button class="btn-tanque" id="btn-azul"     onclick="escolherTanque('tanque1')">
        <img src="/foto1.jpeg" alt="Jogador 1">
        <span>🟦 Azul</span>
      </button>
      <button class="btn-tanque" id="btn-vermelho" onclick="escolherTanque('tanque2')">
        <img src="/foto2.jpeg" alt="Jogador 2">
        <span>🟥 Vermelho</span>
      </button>
      <button class="btn-tanque" id="btn-verde"   onclick="escolherTanque('tanque3')">
        <img src="/foto3.jpeg" alt="Jogador 3">
        <span>🟩 Verde</span>
      </button>
      <button class="btn-tanque" id="btn-amarelo" onclick="escolherTanque('tanque4')">
        <img src="/foto4.jpeg" alt="Jogador 4">
        <span>🟨 Amarelo</span>
      </button>
    </div>
    <button id="btn-entrar" onclick="entrar()">✅ ENTRAR</button>
  </div>

  <div id="tela-espera">
    <div class="apelido" id="apelido-confirmado"></div>
    <div class="status">Aguardando o jogo começar...</div>
    <div class="loader"></div>
  </div>

  <div id="tela-controles">
    <div id="tanque-escolhido"></div>
    <div class="controles-layout">
      <div id="joystick-container">
        <div id="joystick-base"></div>
        <div id="joystick-thumb"></div>
      </div>
      <div id="btn-tiro">
        <span class="tiro-emoji">💥</span>
        <span>ATIRAR</span>
      </div>
    </div>
  </div>

  <div id="tela-eliminado">
    <div class="emoji">💀</div>
    <p>Você foi eliminado!</p>
    <p>Aguarde o fim da partida...</p>
  </div>

  <div id="tela-revanche">
    <div class="emoji">🔄</div>
    <p>Revanche em breve...</p>
    <div class="loader"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let tanqueEscolhido = null;
    let apelidoJogador  = '';

    const btnIds = {
      tanque1: 'btn-azul', tanque2: 'btn-vermelho',
      tanque3: 'btn-verde', tanque4: 'btn-amarelo'
    };
    const fotosTanque = {
      tanque1: '/foto1.jpeg', tanque2: '/foto2.jpeg',
      tanque3: '/foto3.jpeg', tanque4: '/foto4.jpeg'
    };

    function esconderTudo() {
      document.getElementById('tela-entrada').style.display    = 'none';
      document.getElementById('tela-espera').style.display     = 'none';
      document.getElementById('tela-controles').style.display  = 'none';
      document.getElementById('tela-eliminado').style.display  = 'none';
      document.getElementById('tela-revanche').style.display   = 'none';
    }

    function mostrar(id) {
      esconderTudo();
      document.getElementById(id).style.display = 'flex';
    }

    socket.on('lobby-atualizado', (data) => {
      for (const t in btnIds) {
        const btn = document.getElementById(btnIds[t]);
        if (data[t] && data[t] !== apelidoJogador) {
          btn.classList.add('ocupado');
          btn.classList.remove('selecionado');
        } else {
          btn.classList.remove('ocupado');
        }
      }
    });

    function escolherTanque(tanque) {
      const btn = document.getElementById(btnIds[tanque]);
      if (btn.classList.contains('ocupado')) { alert('Esse personagem já está ocupado!'); return; }
      tanqueEscolhido = tanque;
      for (const t in btnIds) document.getElementById(btnIds[t]).classList.remove('selecionado');
      btn.classList.add('selecionado');
    }

    function entrar() {
      const apelido = document.getElementById('input-apelido').value.trim();
      if (!apelido)         { alert('Digite um apelido!'); return; }
      if (!tanqueEscolhido) { alert('Escolha um personagem!'); return; }
      apelidoJogador = apelido;
      socket.emit('jogador-entrou', { apelido, tanque: tanqueEscolhido });
      mostrar('tela-espera');
      // Mostra foto + apelido na tela de espera
      document.getElementById('apelido-confirmado').textContent = apelido;
    }

    socket.on('vaga-ocupada', () => {
      alert('Essa vaga foi ocupada! Escolha outro personagem.');
      mostrar('tela-entrada');
    });

    let joystickIniciado = false;

    socket.on('jogo-iniciado', () => {
      mostrar('tela-controles');
      const div = document.getElementById('tanque-escolhido');
      div.innerHTML = `<img src="${fotosTanque[tanqueEscolhido]}" alt="você"> ${apelidoJogador}`;
      // Inicia o joystick só uma vez
      if (!joystickIniciado) {
        joystickIniciado = true;
        iniciarJoystick();
      }
    });

    socket.on('jogador-eliminado', (tanque) => {
      if (tanque === tanqueEscolhido) {
        mostrar('tela-eliminado');
      }
    });

    socket.on('revanche', () => {
      mostrar('tela-revanche');
      setTimeout(() => {
        mostrar('tela-controles');
        const div = document.getElementById('tanque-escolhido');
        div.innerHTML = '<img src="' + fotosTanque[tanqueEscolhido] + '" alt="voce"> ' + apelidoJogador;
      }, 4000);
    });

    socket.on('nova-partida', () => { location.reload(); });

    // ===== JOYSTICK =====
    function iniciarJoystick() {
      const thumb   = document.getElementById('joystick-thumb');
      const base    = document.getElementById('joystick-base');
      const btnTiro = document.getElementById('btn-tiro');

      const raioBase  = 80;
      const raioThumb = 35;
      let joystickTouchId = null;
      let centroX = 0, centroY = 0;
      let loopId  = null;
      let dx = 0, dy = 0;

      function getCentro() {
        const rect = base.getBoundingClientRect();
        centroX = rect.left + rect.width  / 2;
        centroY = rect.top  + rect.height / 2;
      }

      function moverThumb(cx, cy) {
        let ox = cx - centroX;
        let oy = cy - centroY;
        const dist = Math.sqrt(ox*ox + oy*oy);
        if (dist > raioBase - raioThumb) {
          const angle = Math.atan2(oy, ox);
          ox = Math.cos(angle) * (raioBase - raioThumb);
          oy = Math.sin(angle) * (raioBase - raioThumb);
        }
        thumb.style.left = (raioBase - raioThumb + ox) + 'px';
        thumb.style.top  = (raioBase - raioThumb + oy) + 'px';
        const maxDist = raioBase - raioThumb;
        dx = ox / maxDist;
        dy = oy / maxDist;
      }

      function resetThumb() {
        thumb.style.left = (raioBase - raioThumb) + 'px';
        thumb.style.top  = (raioBase - raioThumb) + 'px';
        dx = 0; dy = 0;
      }

      function iniciarLoop() {
        if (loopId) return;
        loopId = setInterval(() => {
          if (Math.abs(dx) > 0.1 || Math.abs(dy) > 0.1) {
            socket.emit('comando', { tanque: tanqueEscolhido, dx, dy });
          }
        }, 50);
      }

      function pararLoop() {
        if (loopId) { clearInterval(loopId); loopId = null; }
      }

      document.addEventListener('touchstart', (e) => {
        for (const touch of e.changedTouches) {
          const el = document.elementFromPoint(touch.clientX, touch.clientY);
          if ((el === thumb || el === base) && joystickTouchId === null) {
            joystickTouchId = touch.identifier;
            getCentro();
            iniciarLoop();
            e.preventDefault();
          }
        }
      }, { passive: false });

      document.addEventListener('touchmove', (e) => {
        for (const touch of e.changedTouches) {
          if (touch.identifier === joystickTouchId) {
            moverThumb(touch.clientX, touch.clientY);
            e.preventDefault();
          }
        }
      }, { passive: false });

      document.addEventListener('touchend', (e) => {
        for (const touch of e.changedTouches) {
          if (touch.identifier === joystickTouchId) {
            joystickTouchId = null;
            resetThumb();
            pararLoop();
            socket.emit('comando', { tanque: tanqueEscolhido, dx: 0, dy: 0 });
          }
        }
      });

      document.addEventListener('touchcancel', (e) => {
        for (const touch of e.changedTouches) {
          if (touch.identifier === joystickTouchId) {
            joystickTouchId = null;
            resetThumb();
            pararLoop();
          }
        }
      });

      btnTiro.addEventListener('touchstart', (e) => {
        e.stopPropagation();
        e.preventDefault();
        socket.emit('comando', { tanque: tanqueEscolhido, atirar: true });
      }, { passive: false });

      thumb.addEventListener('mousedown', (e) => {
        getCentro();
        iniciarLoop();
        const onMove = (e) => moverThumb(e.clientX, e.clientY);
        const onUp   = () => {
          resetThumb();
          pararLoop();
          socket.emit('comando', { tanque: tanqueEscolhido, dx: 0, dy: 0 });
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      btnTiro.addEventListener('mousedown', () => {
        socket.emit('comando', { tanque: tanqueEscolhido, atirar: true });
      });
    }
  </script>
</body>
</html>
